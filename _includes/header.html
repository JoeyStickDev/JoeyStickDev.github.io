<header class="global-header">
    <div class="header-container">
        <div class="logo">
            <a href="{{ '/' | relative_url }}" class="logo-text">Shards of the Library</a>
        </div>
        <nav class="main-nav">
            <ul>
                <li><a href="{{ '/' | relative_url }}" class="{% if page.url == '/' or page.url == '/index.html' %}active-nav{% endif %}">Home</a></li>
                
                <li class="dropdown">
                    <a href="{{ '/news/' | relative_url }}" class="{% if page.url contains '/news' %}active-nav{% endif %}">News ▾</a>
                    <div class="dropdown-content">
                        <a href="{{ '/news/' | relative_url }}">전체</a>
                        <a href="{{ '/news/#tab-notice' | relative_url }}">공지사항</a>
                        <a href="{{ '/news/#tab-update' | relative_url }}">업데이트</a>
                        <a href="{{ '/news/#tab-devlog' | relative_url }}">개발일지</a>
                    </div>
                </li>
                
                <li class="dropdown">
                    <a href="{{ '/guide/' | relative_url }}" class="{% if page.url contains '/guide' or page.url contains '/storybook' or page.url contains '/lorebook' %}active-nav{% endif %}">Guide ▾</a>
                    <div class="dropdown-content">
                        <a href="{{ '/guide/' | relative_url }}">게임 가이드</a>
                        <a href="{{ '/lorebook/story/' | relative_url }}">스토리북</a>
                        <a href="{{ '/lorebook/' | relative_url }}">설정집</a>
                    </div>
                </li>

                <li class="dropdown">
                    <a href="{{ '/media/' | relative_url }}" class="{% if page.url contains '/media' %}active-nav{% endif %}">Media ▾</a>
                    <div class="dropdown-content">
                        <a href="{{ '/media/#tab-screenshots' | relative_url }}">스크린샷</a>
                        <a href="{{ '/media/#tab-artwork' | relative_url }}">아트워크</a>
                    </div>
                </li>
                
                <li>
                    <a href="{{ '/roadmap/' | relative_url }}" class="{% if page.url contains '/roadmap' %}active-nav{% endif %}">Roadmap</a>
                </li>
            </ul>
        </nav>
        <div class="header-action">
            <a href="https://store.steampowered.com/app/3702320/Shards_of_the_library/" target="_blank" class="btn-play-small">스팀페이지</a>
        </div>
    </div>
</header>
