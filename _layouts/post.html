---
layout: default
---
<article class="post-content-area" style="max-width: 900px; margin: 40px auto; padding: 40px; background: var(--bg-card); border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">
    <header class="post-header" style="border-bottom: 1px solid var(--border-color); padding-bottom: 20px; margin-bottom: 30px;">
        <span class="post-category" style="background: var(--accent-color); color: #fff; padding: 4px 10px; border-radius: 4px; font-size: 0.9rem;">{{ page.category }}</span>
        <h1 class="post-title" style="margin-top: 15px; font-size: 2rem; color: #fff;">{{ page.title }}</h1>
        <p class="post-meta" style="color: var(--text-muted); font-size: 0.9rem; margin-top: 10px;">{{ page.date | date: "%Y년 %m월 %d일" }}</p>
    </header>
    
    <div class="post-body" style="font-size: 1.1rem; line-height: 1.8;">
        {{ content }}
    </div>
    
    <div style="margin-top: 40px; text-align: center;">
        <a href="{{ '/' | relative_url }}" class="btn-play-small" style="background: var(--secondary-color);">목록으로 돌아가기</a>
    </div>
</article>
