---
layout: default
---

<div class="story-container">
    <div class="story-header">
        <a href="{{ '/lorebook/story/' | relative_url }}" class="btn-back">← 스토리 목록으로</a>
        <h1 class="story-chapter-title">{{ page.title }}</h1>
        <div class="story-meta">
            <span class="story-tag">Main Story</span>
        </div>
    </div>

    <article class="story-content">
        {{ content }}
    </article>

    <div class="story-footer">
        <div class="story-navigation">
            {% if page.prev_chapter %}
            <a href="{{ page.prev_chapter | relative_url }}" class="nav-btn prev">
                <span class="nav-label">이전 챕터</span>
                <span class="nav-title">{{ page.prev_title }}</span>
            </a>
            {% else %}
            <div class="nav-placeholder"></div>
            {% endif %}

            {% if page.next_chapter %}
            <a href="{{ page.next_chapter | relative_url }}" class="nav-btn next">
                <span class="nav-label">다음 챕터</span>
                <span class="nav-title">{{ page.next_title }}</span>
            </a>
            {% else %}
            <div class="nav-placeholder"></div>
            {% endif %}
        </div>
    </div>
</div>

<style>
.story-container {
    max-width: 800px;
    margin: 60px auto;
    padding: 0 20px;
    color: #e0e0e0;
}

.story-header {
    text-align: center;
    margin-bottom: 50px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    padding-bottom: 30px;
}

.btn-back {
    display: inline-block;
    color: #ffd700;
    text-decoration: none;
    margin-bottom: 20px;
    font-size: 0.9rem;
    transition: transform 0.2s;
}

.btn-back:hover {
    transform: translateX(-5px);
}

.story-chapter-title {
    font-size: 2.5rem;
    font-family: 'Outfit', sans-serif;
    background: linear-gradient(135deg, #fff 0%, #ffd700 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 10px;
}

.story-tag {
    background: rgba(255, 215, 0, 0.1);
    color: #ffd700;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.8rem;
    border: 1px solid rgba(255, 215, 0, 0.3);
}

.story-content {
    font-size: 1.15rem;
    line-height: 1.8;
    font-family: 'Inter', 'Noto Sans KR', sans-serif;
    color: #ccc;
    text-align: justify;
}

.story-content h1, .story-content h2 {
    color: #fff;
    margin-top: 2em;
    font-family: 'Outfit', sans-serif;
}

.story-content p {
    margin-bottom: 1.5em;
}

.story-content blockquote {
    border-left: 4px solid #ffd700;
    margin: 2em 0;
    padding: 10px 20px;
    background: rgba(255,215,0,0.05);
    color: #fff;
    font-style: italic;
}

.story-footer {
    margin-top: 80px;
    padding-top: 40px;
    border-top: 1px solid rgba(255,255,255,0.1);
}

.story-navigation {
    display: flex;
    justify-content: space-between;
    gap: 20px;
}

.nav-btn {
    flex: 1;
    background: rgba(255,255,255,0.03);
    padding: 20px;
    border-radius: 12px;
    text-decoration: none;
    transition: all 0.3s;
    border: 1px solid rgba(255,255,255,0.05);
}

.nav-btn:hover {
    background: rgba(255,215,0,0.08);
    border-color: rgba(255,215,0,0.3);
    transform: translateY(-5px);
}

.nav-label {
    display: block;
    font-size: 0.8rem;
    color: #888;
    margin-bottom: 4px;
}

.nav-title {
    display: block;
    font-size: 1rem;
    color: #fff;
    font-weight: 600;
}

.next { text-align: right; }
.nav-placeholder { flex: 1; }

@media (max-width: 600px) {
    .story-navigation { flex-direction: column; }
    .story-chapter-title { font-size: 1.8rem; }
}
</style>
