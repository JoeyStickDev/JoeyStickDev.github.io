</header>

    
    <main>
        <section class="main-content" style="padding-top: 100px; min-height: 80vh;">
    <!-- 그리드 버그 방지를 위해 display:block 방식 채택 -->
    <div style="max-width: 1000px; margin: 0 auto; display: block;">
        
        <div class="storybook-header" style="text-align: center; margin-bottom: 40px; border-bottom: 2px solid rgba(255,255,255,0.1); padding-bottom: 30px;">
            <h1 style="color: var(--accent-color); font-family: var(--font-heading); font-size: 3rem; letter-spacing: 2px;">Storybook</h1>
            <p style="color: var(--text-muted); font-size: 1.1rem;">도서관의 잊혀진 이야기와 인물들의 기록을 열람하세요.</p>
        </div>

        <div class="notice-board" style="background: rgba(28, 37, 65, 0.4); backdrop-filter: blur(5px);">
            <div class="board-header">
                <h2>스토리 도서관 목록</h2>
            </div>
            
            <div class="tabs">
                <button class="tab-btn active" data-target="tab-story-all">전체</button>
                <button class="tab-btn" data-target="tab-story-main">메인</button>
                <button class="tab-btn" data-target="tab-story-sub">메인서브</button>
                <button class="tab-btn" data-target="tab-story-skill">스킬</button>
                <button class="tab-btn" data-target="tab-story-story">스토리</button>
            </div>

                    <ul class="post-list">

                    </ul>
                </div>
                
            </div>
