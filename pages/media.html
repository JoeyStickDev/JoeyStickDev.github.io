<section class="main-content page-media" style="padding-top: 100px; min-height: 80vh;">

                    <a href="https://steamcommunity.com/app/3702320/screenshots/" target="_blank" class="media-card" style="display: block; background: var(--bg-card); border-radius: 8px; overflow: hidden; border: 1px solid var(--border-color); transition: transform 0.3s;">

                    <a href="https://steamcommunity.com/app/3702320/images/" target="_blank" class="btn-more" style="font-size: 1.1rem; padding: 10px 20px; background: var(--bg-dark); border-radius: 20px;">스팀에서 더 많은 아트워크 보기 +</a>

</section>
