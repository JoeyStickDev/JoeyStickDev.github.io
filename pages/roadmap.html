---
layout: default
title: Roadmap
permalink: /roadmap/
---
<style>
.roadmap-container {
    padding: 100px 20px 40px;
    max-width: 1000px;
    margin: 0 auto;
    color: #fff;
    min-height: 80vh;
}

.roadmap-header {
    text-align: center;
    margin-bottom: 80px;
}

.roadmap-header h1 {
    font-size: 2.5rem;
    margin-bottom: 15px;
    color: #bb86fc;
}

.timeline-wrapper {
    overflow-x: auto;
    padding: 40px 0;
}

/* Custom Scrollbar for horizontal scrolling */
.timeline-wrapper::-webkit-scrollbar {
    height: 10px;
}
.timeline-wrapper::-webkit-scrollbar-track {
    background: rgba(255, 255, 255, 0.05);
    border-radius: 5px;
}
.timeline-wrapper::-webkit-scrollbar-thumb {
    background: #bb86fc;
    border-radius: 5px;
}

.timeline {
    display: flex;
    position: relative;
    padding: 60px 20px;
    min-width: 900px;
}

/* Horizontal Line */
.timeline::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 20px;
    right: 20px;
    height: 4px;
    background: #444;
    transform: translateY(-50%);
    border-radius: 2px;
}

.timeline-item {
    position: relative;
    flex: 1;
    min-width: 250px;
    padding: 0 15px;
}

/* Dot on the timeline */
.timeline-dot {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 20px;
    height: 20px;
    border-radius: 50%;
    background: #222;
    border: 4px solid #444;
    z-index: 2;
    transition: all 0.3s ease;
}

.timeline-item.completed .timeline-dot {
    background: #bb86fc;
    border-color: #bb86fc;
    box-shadow: 0 0 15px rgba(187, 134, 252, 0.8);
}

.timeline-item.in-progress .timeline-dot {
    background: #03dac6;
    border-color: #03dac6;
    box-shadow: 0 0 15px rgba(3, 218, 198, 0.8);
}

.timeline-content {
    background: rgba(30, 30, 30, 0.9);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    padding: 20px;
    position: relative;
    width: 100%;
    box-sizing: border-box;
    box-shadow: 0 4px 6px rgba(0,0,0,0.3);
}

/* Zig-zag arrangement */
.timeline-item:nth-child(odd) .timeline-content {
    margin-bottom: 60px;
    transform: translateY(-20px);
}
.timeline-item:nth-child(even) .timeline-content {
    margin-top: 60px;
    transform: translateY(20px);
}

/* Arrows pointing to the line */
.timeline-item:nth-child(odd) .timeline-content::after {
    content: '';
    position: absolute;
    bottom: -10px;
    left: 50%;
    transform: translateX(-50%);
    border-width: 10px 10px 0;
    border-style: solid;
    border-color: rgba(30, 30, 30, 0.9) transparent transparent transparent;
}

.timeline-item:nth-child(even) .timeline-content::after {
    content: '';
    position: absolute;
    top: -10px;
    left: 50%;
    transform: translateX(-50%);
    border-width: 0 10px 10px;
    border-style: solid;
    border-color: transparent transparent rgba(30, 30, 30, 0.9) transparent;
}

.timeline-date {
    font-size: 0.9rem;
    color: #bb86fc;
    font-weight: bold;
    margin-bottom: 8px;
    letter-spacing: 1px;
}

.timeline-item.in-progress .timeline-date {
    color: #03dac6;
}

.timeline-title {
    font-size: 1.3rem;
    font-weight: 600;
    margin-bottom: 12px;
    color: #fff;
}

.timeline-detail {
    font-size: 0.95rem;
    color: #ccc;
    line-height: 1.5;
    margin-bottom: 15px;
}

.timeline-progress {
    display: inline-block;
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 0.85rem;
    font-weight: bold;
}

.completed .timeline-progress {
    background: rgba(187, 134, 252, 0.2);
    color: #bb86fc;
}

.in-progress .timeline-progress {
    background: rgba(3, 218, 198, 0.2);
    color: #03dac6;
}

.planned .timeline-progress {
    background: rgba(255, 255, 255, 0.1);
    color: #aaa;
}
</style>

<section class="roadmap-container">
    <div class="roadmap-header">
        <h1>개발 로드맵 (Roadmap)</h1>
        <p style="color: var(--text-muted); font-size: 1.1rem;">Shards of the Library의 주요 개발 일정과 진행 상황입니다.</p>
    </div>

    <div class="timeline-wrapper">
        <div class="timeline">
            {% for item in site.data.roadmap %}
            <div class="timeline-item {{ item.status }}">
                <div class="timeline-content">
                    <div class="timeline-date">{{ item.date }}</div>
                    <div class="timeline-title">{{ item.title }}</div>
                    <div class="timeline-detail">{{ item.detail }}</div>
                    <div class="timeline-progress">{{ item.progress_text }}</div>
                </div>
                <div class="timeline-dot"></div>
            </div>
            {% endfor %}
        </div>
    </div>
</section>
